# =============================================================================
# auto_actuary — Schema Configuration
# =============================================================================
# Map YOUR database column names to the canonical aliases used throughout the
# codebase.  Only columns listed here will be recognized by the loaders.
#
# Format:
#   <table_alias>:
#     canonical_name: your_actual_column_name
#
# Leave the right-hand value blank ("") if you want to use the canonical name
# as-is (e.g., if your DB already uses "policy_id").
#
# Supported table aliases:  policies | transactions | claims | valuations
#                           coverages | rate_changes | expenses
# =============================================================================

# ---------------------------------------------------------------------------
# Connection / source hints  (overridden by CLI flags or session kwargs)
# ---------------------------------------------------------------------------
source:
  type: csv            # csv | sqlite | sqlalchemy | dataframe
  base_path: ./data    # where to find .csv files when type=csv
  # connection_string: "postgresql://user:pass@host/db"  # for sqlalchemy

# ---------------------------------------------------------------------------
# Policies
# Grain: one row per policy term
# ---------------------------------------------------------------------------
policies:
  policy_id:          policy_id           # unique internal policy key
  policy_number:      policy_number       # display identifier
  written_date:       written_date        # date transaction was recorded
  effective_date:     eff_date            # coverage start date
  expiration_date:    exp_date            # coverage end date
  cancel_date:        cancel_date         # date cancelled (null if in-force)
  line_of_business:   lob_code            # e.g. PPA, HO, CMP, WC
  sub_line:           sub_line            # optional sub-classification
  territory:          terr_code           # state / territory code
  class_code:         class_code          # underwriting class
  risk_id:            insured_id
  agent_id:           agent_code
  written_premium:    wrt_prem
  earned_premium:     ern_prem            # pro-rata earned premium through cut-off date
  transaction_type:   txn_type            # NB (new business) | RN (renewal)
  written_exposure:   wrt_exposure        # car-years, house-years, etc.
  exposure_unit:      exp_unit            # label: "car-year", "house-year"

# ---------------------------------------------------------------------------
# Transactions
# Grain: one row per transaction (NB, RN, EN, XL, CN)
# ---------------------------------------------------------------------------
transactions:
  transaction_id:     txn_id
  policy_id:          policy_id
  transaction_date:   txn_date
  effective_date:     eff_date
  transaction_type:   txn_type            # NB | RN | EN | XL | CN | FL
  written_premium:    wrt_prem
  written_exposure:   wrt_exposure
  line_of_business:   lob_code
  territory:          terr_code
  class_code:         class_code

# ---------------------------------------------------------------------------
# Claims
# Grain: one row per claim
# ---------------------------------------------------------------------------
claims:
  claim_id:           claim_id
  policy_id:          policy_id
  accident_date:      loss_date
  report_date:        report_date
  close_date:         close_date
  reopen_date:        reopen_date
  coverage_code:      cov_code            # BI, PD, COMP, COLL, MED, etc.
  line_of_business:   lob_code
  territory:          terr_code
  cause_of_loss:      cause_code
  claim_status:       status              # O=Open, C=Closed, R=Reopened
  is_catastrophe:     is_cat              # boolean / 0-1
  cat_code:           cat_code            # event identifier

# ---------------------------------------------------------------------------
# Loss Valuations
# Grain: one row per (claim_id, valuation_date)
# This is the core table for triangle development.
# ---------------------------------------------------------------------------
valuations:
  claim_id:           claim_id
  valuation_date:     val_date
  paid_loss:          paid_loss
  case_reserve:       case_reserve
  incurred_loss:      incurred_loss       # paid + case; compute if not present
  paid_alae:          paid_alae
  case_alae:          case_alae
  paid_ulae:          paid_ulae           # optional
  paid_count:         paid_cnt            # 1 if closed at this val date, else 0
  open_count:         open_cnt            # 1 if open at this val date, else 0

# ---------------------------------------------------------------------------
# Coverages (by policy)
# Grain: one row per (policy_id, coverage_code)
# ---------------------------------------------------------------------------
coverages:
  policy_id:          policy_id
  coverage_code:      cov_code
  limit_amount:       cov_limit
  deductible:         deductible
  premium:            cov_prem
  exposure:           cov_exposure

# ---------------------------------------------------------------------------
# Rate Changes
# Used by the on-level / parallelogram premium adjustment.
# Grain: one row per rate change filing
# ---------------------------------------------------------------------------
rate_changes:
  effective_date:     eff_date
  line_of_business:   lob_code
  territory:          terr_code           # leave blank for statewide
  class_code:         class_code          # leave blank for all classes
  rate_change_pct:    rate_chg_pct        # decimal, e.g. 0.05 = +5%

# ---------------------------------------------------------------------------
# Expenses
# Grain: one row per (year, expense_type)
# ---------------------------------------------------------------------------
expenses:
  calendar_year:      cal_year
  line_of_business:   lob_code
  expense_type:       exp_type            # ALAE | ULAE | Other Acq | Gen & Admin
  amount:             exp_amount
  written_premium:    wrt_prem            # for ratio calculation
  earned_premium:     ern_prem

# =============================================================================
# Segmentation Configuration
# =============================================================================
# Define which columns from your policies/claims tables represent geographic
# and market segments.  These drive the Segment Analytics Dashboard.
#
# Column names must match CANONICAL names after schema renaming (i.e., the
# left-hand side values above, not the raw DB column names).
#
# GEO_SEGMENTS   — geographic breakdowns, e.g. state, region, zip_tier
# MARKET_SEGMENTS — underwriting/market breakdowns, e.g. class_code, agent tier
#
# Add as many entries as you like.  They will become filter dropdowns in the
# Segment Analytics Dashboard.  Columns must exist in the policies table.
# =============================================================================
segmentation:
  geo_segments:
    - territory          # always available in the demo schema

  market_segments:
    - class_code         # always available in the demo schema
    - agent_id           # agent who wrote the policy

  # Segment labels (optional — used for display only)
  segment_labels:
    territory:  "Territory"
    class_code: "Class Code"
    agent_id:   "Agent"

  # Time granularity for segment trend charts
  time_granularity: year   # year | quarter

  # -------------------------------------------------------------------------
  # SQL Output Requirements for Segment Analytics
  # -------------------------------------------------------------------------
  # If you source data from a SQL database, your policy-level query must
  # include the following columns (in addition to the standard policies schema):
  #
  # REQUIRED columns for segment analytics to work:
  #   policy_id          — unique policy term key
  #   risk_id            — account/insured identifier (for retention tracking)
  #   policy_number      — shared across consecutive terms (for renewal matching)
  #   effective_date     — coverage start date (determines accident year)
  #   expiration_date    — coverage end date (used for retention)
  #   transaction_type   — NB (new business) or RN (renewal)
  #   written_premium    — written premium for the term
  #   earned_premium     — pro-rata earned premium through your cut-off date
  #   line_of_business   — LOB code
  #   <segment columns>  — each column listed in geo_segments / market_segments
  #
  # REQUIRED columns for loss metrics in segment dashboard:
  #   From claims + latest valuation join:
  #   incurred_loss      — total incurred loss (paid + case reserve)
  #   paid_loss          — paid to date
  #   claim_count        — number of claims (1 per claim row before aggregation)
  #
  # Example SQL for the policies-level time-series extract:
  #
  #   SELECT
  #       p.policy_id,
  #       p.risk_id,
  #       p.policy_number,
  #       p.eff_date         AS effective_date,
  #       p.exp_date         AS expiration_date,
  #       t.txn_type         AS transaction_type,   -- NB or RN
  #       p.wrt_prem         AS written_premium,
  #       -- Pro-rata earned premium through your evaluation date:
  #       p.wrt_prem * DATEDIFF(LEAST(p.exp_date, '2023-12-31'), p.eff_date)
  #           / NULLIF(DATEDIFF(p.exp_date, p.eff_date), 0) AS earned_premium,
  #       p.lob_code         AS line_of_business,
  #       p.terr_code        AS territory,          -- geo segment
  #       p.class_code,                             -- market segment
  #       p.agent_code       AS agent_id            -- market segment
  #   FROM policies p
  #   LEFT JOIN transactions t ON p.policy_id = t.policy_id
  #       AND t.txn_type IN ('NB','RN')
  #   WHERE p.lob_code = 'PPA'
  #     AND p.eff_date >= '2018-01-01'
  #
  # For retention: the analytics engine self-joins policies on (policy_number,
  # effective year = prior year + 1) to determine if a policy renewed.
  # No additional SQL column is needed — just ensure policy_number is consistent
  # across terms.
